# CycCloner2000 configuration
#
# This file is loaded by cyc-cloner.sh from the script directory.
# /etc/cyccloner2000.conf is also supported and is loaded first.

# Where disk images are stored.
BACKUP_DIR="/root/images"

# Main log file.
LOG_FILE="/var/log/cyc-cloner.log"

# Compression and timeout settings.
COMPRESSION="pigz"
TIMEOUT_SECONDS=30

# Automatic disk refresh. Keep enabled for hot-swap cloning stations.
AUTO_REFRESH_DISKS=true
DEVICE_SETTLE_SECONDS=2
PARTITION_TABLE_SETTLE_SECONDS=5

# Boot behavior.
RANDOMIZE_GPT_GUIDS=false
CREATE_EFI_NVRAM_ENTRY=false
GRUB_BOOTLOADER_ID="GRUB"

